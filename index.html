async function loadAll(){
  try{
    const m = await sb.from("journal_meta").select("*").eq("id", 1).maybeSingle();
    if(m.data) state.meta = {subject: m.data.subject || "", dedication: m.data.dedication || ""};
    const e = await sb.from("entries").select("*").order("created_at", {ascending:true});

  }catch(err){

}

}
async function uploadDoc(file){
  const safe = file.name.replace(/[^\w.\- ]/g, "_");
  const path = "doc/" + uid() + "-" + safe;
  const up = await sb.storage.from("journal").upload(path, file, {contentType: file.type || "application/octet-stream"});
  if(up.error) throw up.error;
  return {u: sb.storage.from("journal").getPublicUrl(path).data.publicUrl, l: file.name, path};
}

function compressToBlob(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        try{
          let w = img.width, h = img.height;
          const MAX = 1200;
          if(w > MAX || h > MAX){ const s = MAX / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s); }
          const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
          cv.getContext("2d").drawImage(img, 0, 0, w, h);
          cv.toBlob(b => b ? resolve(b) : reject(new Error("compress failed")), "image/jpeg", 0.78);
        }catch(e){ reject(e); }
      };
      img.onerror = () => reject(new Error("bad image"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("read failed"));
    reader.readAsDataURL(file);
  });
}

function entryHTML(pid, en, readOnly){

  const imgs = en.images || [];

    h += '<div class="thumbs">';
    imgs.forEach(im => { h += '<img class="thumb" alt="Journal photo" src="'+esc(im.u)+'" onclick="J.zoom(this.src)">'; });

  }
  (en.links || []).forEach(l => {
    h += '<a class="e-link" target="_blank" rel="noopener noreferrer" href="'+esc(normUrl(l.u))+'">&#8599; '+esc(l.l || l.u)+'</a>';
  });
  (en.docs || []).forEach(d0 => {
    h += '<a class="e-doc" target="_blank" rel="noopener noreferrer" href="'+esc(d0.u)+'">&#128196; '+esc(d0.l || "Document")+'</a>';

  if(!readOnly) h += '<div style="text-align:right;margin-top:8px"><button class="linky" onclick="J.remove(\''+pid+'\',\''+en.id+'\')">Remove</button></div>';
  return h + '</div>';
}

  const d = state.draft; if(!d) return "";
  let h = "";
  d.links.forEach((l,i)=>{ h += '<span class="chip"><span>&#8599; '+esc(l.l)+'</span><button onclick="J.dropLink('+i+')" aria-label="Remove link">&#10005;</button></span>'; });
  d.docs.forEach((f,i)=>{ h += '<span class="chip"><span>&#128196; '+esc(f.file.name)+'</span><button onclick="J.dropDoc('+i+')" aria-label="Remove document">&#10005;</button></span>'; });
  return h;
}
function thumbsHTML(){
  const d = state.draft; if(!d) return "";
  return d.photos.map((p,i)=>'<span class="twrap"><img class="thumb" style="height:64px;width:64px" src="'+p.url+'" alt="To attach">'
    +'<button class="tx" onclick="J.dropPhoto('+i+')" aria-label="Remove photo">&#10005;</button></span>').join("");
}

function composerHTML(p){
  return '<div class="composer">'
   +'<textarea id="cw-text" spellcheck="true" rows="'+(p.short?2:5)+'" placeholder="'+(p.short?"Your answer…":"Write the memory in your own words…")+'"></textarea>'
   +'<div id="cw-thumbs" class="thumbs">'+thumbsHTML()+'</div>'
   +'<div id="cw-chips" class="chips">'+chipsHTML()+'</div>'
   +'<div id="cw-attach"></div>'
   +'<div class="row mt">'
   +'<label class="btn btn-line sm" for="cw-photos">+ Photo</label>'
   +'<input id="cw-photos" type="file" accept="image/*" multiple hidden onchange="J.pickPhotos(event)">'
   +'<label class="btn btn-line sm" for="cw-docs">+ Document</label>'
   +'<input id="cw-docs" type="file" multiple hidden onchange="J.pickDocs(event)">'
   +'<button class="btn btn-line sm" onclick="J.linkForm()">+ Link</button>'
   +'</div>'
   +'<div class="row mt">'
   +'<button id="cw-save" class="btn btn-solid" onclick="J.save(\''+p.id+'\')">Add to the journal</button>'
   +'<button class="btn" onclick="J.cancel()">Cancel</button>'
   +'</div>'
   +'<p class="hint">Spell check is on — misspellings get the squiggly underline as you type.</p>'
   +'</div>';
}

function nameCardHTML(){
  return '<div class="card"><p style="margin:0 0 10px">First — who is writing?</p>'
   +'<div class="row"><input id="nm" type="text" spellcheck="false" placeholder="Your name" style="flex:1;min-width:160px" value="'+esc(state.me)+'">'
   +'<button class="btn btn-solid" onclick="J.saveName()">That is me</button>'
   +'<button class="btn" onclick="J.closeName()">Cancel</button></div>'
   +'<p class="hint">Your name is signed under each memory you add.</p></div>';
}

function journalHTML(){
  let h = '<div class="wrap">';
  h += '<div class="center">'
    +'<p class="eyebrow sans">A GUIDED LEGACY JOURNAL</p>'
    +'<h1 style="font-size:36px;margin-top:8px">The Story of a Life</h1>';
  if(state.editingMeta){
    h += '<div style="max-width:420px;margin:16px auto 0;text-align:left">'
      +'<input id="mt-s" type="text" spellcheck="true" placeholder="Whose life is this? (e.g., Grandma June)" value="'+esc(state.meta.subject)+'">'
      +'<div class="mt"></div>'
      +'<input id="mt-d" type="text" spellcheck="true" placeholder="A dedication line (optional)" value="'+esc(state.meta.dedication)+'">'
      +'<div class="row mt" style="justify-content:center"><button class="btn btn-solid sm" onclick="J.saveMeta()">Save</button>'
      +'<button class="btn sm" onclick="J.closeMeta()">Cancel</button></div></div>';
  } else {
    h += '<button class="linky" style="margin-top:8px" onclick="J.editMeta()">'
      +'<span class="italic" style="font-family:Georgia,serif;font-size:18px;color:var(--ink);text-decoration:none">'
      +(state.meta.subject ? "The life of "+esc(state.meta.subject) : "Tap to name whose life this is")+'</span></button>';
    if(state.meta.dedication) h += '<p class="italic small softc" style="margin:4px 0 0">'+esc(state.meta.dedication)+'</p>';
  }
  h += ORN
    +'<p class="italic softc" style="font-size:14px;max-width:420px;margin:0 auto">One life, many voices. Open a chapter, add a memory, a photo, a document — every contribution is signed and kept.</p>'
    +'</div>';
  h += '<div class="row between no-print" style="margin:24px 0 8px">'
    +'<button class="pill" onclick="J.nameForm(\'pill\')">'+(state.me ? "Writing as "+esc(state.me)+" · change" : "Set your name")+'</button>'
    +'<div class="row"><button class="btn btn-line sm" onclick="J.refresh()">Refresh</button>'
    +'<button class="btn btn-line sm" onclick="J.read()">Read the whole journal</button></div></div>';
  if(state.naming === "pill") h += nameCardHTML();
  if(!state.loaded){ h += '<p class="center small sans softc" style="padding:32px 0">Opening the journal…</p>'; }
  h += '<div style="border-top:1px solid var(--line)">';
  SECTIONS.forEach((sec, si) => {
    const count = sec.prompts.filter(p => (state.byPrompt[p.id] || []).length).length;
    const isOpen = state.open === sec.id;
    h += '<div class="sec">'
      +'<button class="sec-row" onclick="J.toggle(\''+sec.id+'\')">'
      +'<span class="dia" style="background:'+(count ? "var(--terra)" : "var(--line)")+'"></span>'
      +'<span class="t">'+esc(sec.title)+'</span>'
      +'<span class="c">'+(count ? count+" answered" : "")+'</span>'
      +'<span class="c">'+(isOpen ? "&ndash;" : "+")+'</span></button>';
    if(isOpen){
      h += '<div style="padding-bottom:24px">'
        +'<p class="eyebrow sans" style="letter-spacing:.2em;margin:0">SECTION '+(si+1)+'</p>';
      sec.prompts.forEach(p => {
        h += '<p class="prompt">'+esc(p.q)+'</p>';
        (state.byPrompt[p.id] || []).forEach(en => { h += entryHTML(p.id, en, false); });
        if(state.naming === p.id) h += nameCardHTML();
        if(state.composing === p.id) h += composerHTML(p);
        else if(state.naming !== p.id){
          h += '<button class="linky teal" onclick="J.compose(\''+p.id+'\')">'
            +((state.byPrompt[p.id] || []).length ? "+ Add another memory" : "+ Be the first to answer")+'</button>';
        }
      });
      h += '</div>';
    }
    h += '</div>';
  });
  h += '</div>';
  h += '<p class="center small sans softc" style="margin-top:32px">Shared family journal — everyone with this link can read and add to everything here.</p>';
  h += '</div>';
  return h;
}

function readingHTML(){
  let h = '<div class="wrap">';
  h += '<div class="row between no-print" style="margin-bottom:24px">'
    +'<button class="btn btn-line sm" onclick="J.back()">&larr; Back to writing</button>'
    +'<button class="btn btn-solid sm" onclick="window.print()">Print</button></div>';
  h += '<div class="center"><p class="eyebrow sans">A GUIDED LEGACY JOURNAL</p>'
    +'<h1 style="font-size:34px;margin-top:8px">The Story of a Life</h1>';
  if(state.meta.subject) h += '<p class="italic" style="margin:8px 0 0">The life of '+esc(state.meta.subject)+'</p>';
  if(state.meta.dedication) h += '<p class="italic small softc" style="margin:4px 0 0">'+esc(state.meta.dedication)+'</p>';
  h += ORN + '</div>';
  let any = false;
  SECTIONS.forEach(sec => {
    const withContent = sec.prompts.filter(p => (state.byPrompt[p.id] || []).length);
    if(!withContent.length) return;
    any = true;
    h += '<div style="margin-top:40px"><div class="center"><h2 style="font-size:24px">'+esc(sec.title)+'</h2>'+ORN+'</div>';
    withContent.forEach(p => {
      h += '<p class="prompt">'+esc(p.q)+'</p>';
      (state.byPrompt[p.id] || []).forEach(en => { h += entryHTML(p.id, en, true); });
    });
    h += '</div>';
  });
  if(!any) h += '<p class="center italic softc" style="padding:40px 0">Nothing has been written yet. The first memory is waiting for you.</p>';
  h += '<div class="center" style="margin:56px 0 24px">'+ORN+'<p class="italic small softc">A life, set down in our own words.</p></div>';
  h += '</div>';
  return h;
}

function setupHTML(){
  return '<div class="wrap"><div class="card" style="margin-top:48px">'
   +'<h2 style="font-size:20px">One setup step to go</h2>'
   +'<p style="line-height:1.6">This page is not connected to its family database yet. Open <b>index.html</b> in your GitHub repo, '
   +'find the SETUP block at the top of the code, and paste in your Supabase <b>Project URL</b> and <b>anon public key</b>. '
   +'The setup guide walks you through it step by step.</p></div></div>';
}

function render(){
  const app = $("app");
  if(state.view === "cover") app.innerHTML = coverHTML();
  else if(state.view === "reading") app.innerHTML = readingHTML();
  else app.innerHTML = journalHTML();
  if(state.lightbox){
    const lb = document.createElement("div");
    lb.className = "lightbox";
    lb.onclick = () => { state.lightbox = null; render(); };
    lb.innerHTML = '<img alt="Journal photo, enlarged" src="'+esc(state.lightbox)+'">';
    app.appendChild(lb);
  }
}

/* ------------------------- actions ------------------------- */
const J = {
  enter(){ state.view = "journal"; render(); },
  back(){ state.view = "journal"; render(); },
  read(){ state.view = "reading"; render(); },
  toggle(id){ state.open = state.open === id ? null : id; state.composing = null; state.naming = null; render(); },
  async refresh(){ await loadAll(); render(); toast("Up to date."); },
  zoom(src){ state.lightbox = src; render(); },

  nameForm(target){ state.naming = target; render(); const el = $("nm"); if(el) el.focus(); },
  closeName(){ state.naming = null; render(); },
  saveName(){
    const v = ($("nm") && $("nm").value.trim()) || "";
    if(!v) return;
    state.me = v; localStorage.setItem("sol-name", v);
    const target = state.naming; state.naming = null;
    if(target && target !== "pill") J.compose(target); else render();
  },

  compose(pid){
    if(!state.me){ J.nameForm(pid); return; }
    state.composing = pid;
    state.draft = {photos:[], docs:[], links:[]};
    render();
    const t = $("cw-text"); if(t) t.focus();
  },
  cancel(){ state.composing = null; state.draft = null; render(); },

  async pickPhotos(ev){
    const files = Array.from(ev.target.files || []).slice(0, 4 - state.draft.photos.length);
    ev.target.value = "";
    for(const f of files){
      try{
        const blob = await compressToBlob(f);
        if(state.draft.photos.length < 4) state.draft.photos.push({blob, url: URL.createObjectURL(blob)});
      }catch{ toast("That photo could not be added."); }
    }
    if($("cw-thumbs")) $("cw-thumbs").innerHTML = thumbsHTML();
  },
  pickDocs(ev){
    const files = Array.from(ev.target.files || []).slice(0, 3 - state.draft.docs.length);
    ev.target.value = "";
    for(const f of files){
      if(f.size > 20 * 1024 * 1024){ toast('"'+f.name+'" is over 20 MB — attach it as a link instead.'); continue; }
      state.draft.docs.push({file: f});
    }
    if($("cw-chips")) $("cw-chips").innerHTML = chipsHTML();
  },
  linkForm(){
    const a = $("cw-attach"); if(!a) return;
    a.innerHTML = '<div class="mt"><input id="at-u" type="text" spellcheck="false" placeholder="Paste a web link (https://…)">'
      +'<div class="mt"></div><input id="at-l" type="text" spellcheck="true" placeholder="What is it? (a short label)">'
      +'<div class="row mt"><button class="btn btn-line sm" onclick="J.addLink()">Attach</button>'
      +'<button class="btn sm" onclick="J.closeLink()">Cancel</button></div></div>';
    $("at-u").focus();
  },
  closeLink(){ if($("cw-attach")) $("cw-attach").innerHTML = ""; },
  addLink(){
    const u = ($("at-u") && $("at-u").value.trim()) || "";
    if(!u) return;
    const l = ($("at-l") && $("at-l").value.trim()) || u;
    state.draft.links.push({u: normUrl(u), l});
    J.closeLink();
    if($("cw-chips")) $("cw-chips").innerHTML = chipsHTML();
  },
  dropPhoto(i){ state.draft.photos.splice(i,1); if($("cw-thumbs")) $("cw-thumbs").innerHTML = thumbsHTML(); },
  dropDoc(i){ state.draft.docs.splice(i,1); if($("cw-chips")) $("cw-chips").innerHTML = chipsHTML(); },
  dropLink(i){ state.draft.links.splice(i,1); if($("cw-chips")) $("cw-chips").innerHTML = chipsHTML(); },

  async save(pid){
    const body = ($("cw-text") && $("cw-text").value.trim()) || "";
    const d = state.draft;
    if(!body && !d.photos.length && !d.docs.length && !d.links.length){
      toast("Write a memory or attach something first."); return;
    }
    const btn = $("cw-save"); if(btn){ btn.disabled = true; btn.textContent = "Saving…"; }
    try{
      const images = [];
      for(const p of d.photos) images.push(await uploadPhoto(p.blob));
      const docs = [];
      for(const f of d.docs) docs.push(await uploadDoc(f.file));
      const row = {prompt_id: pid, author: state.me, body, links: d.links, docs, images};
      const ins = await sb.from("entries").insert(row).select().single();
      if(ins.error) throw ins.error;
      (state.byPrompt[pid] = state.byPrompt[pid] || []).push(ins.data);
      state.composing = null; state.draft = null;
      render();
      toast("Added to the journal.");
    }catch(err){
      console.error(err);
      if(btn){ btn.disabled = false; btn.textContent = "Add to the journal"; }
      toast("Could not save. Check your connection and try again.");
    }
  },

  async remove(pid, id){
    if(!confirm("Remove this memory from the journal for everyone?")) return;
    try{
      const list = state.byPrompt[pid] || [];
      const en = list.find(e => e.id === id);
      const paths = [];
      if(en){
        (en.images || []).forEach(im => im.path && paths.push(im.path));
        (en.docs || []).forEach(d0 => d0.path && paths.push(d0.path));
      }
      if(paths.length) await sb.storage.from("journal").remove(paths);
      const del = await sb.from("entries").delete().eq("id", id);
      if(del.error) throw del.error;
      state.byPrompt[pid] = list.filter(e => e.id !== id);
      render();
      toast("Removed.");
    }catch(err){
      console.error(err);
      toast("Could not remove that. Try again.");
    }
  },

  editMeta(){ state.editingMeta = true; render(); const el = $("mt-s"); if(el) el.focus(); },
  closeMeta(){ state.editingMeta = false; render(); },
  async saveMeta(){
    const subject = ($("mt-s") && $("mt-s").value.trim()) || "";
    const dedication = ($("mt-d") && $("mt-d").value.trim()) || "";
    try{
      const up = await sb.from("journal_meta").upsert({id: 1, subject, dedication});
      if(up.error) throw up.error;
      state.meta = {subject, dedication};
      state.editingMeta = false;
      render();
      toast("Saved.");
    }catch(err){ console.error(err); toast("Could not save. Try again."); }
  }
};
window.J = J;

/* ------------------------- boot ------------------------- */
(async function(){
  if(SUPABASE_URL.indexOf("PASTE_") === 0 || SUPABASE_ANON_KEY.indexOf("PASTE_") === 0){
    $("app").innerHTML = setupHTML();
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  render();            // show the cover immediately
  await loadAll();     // then pull the journal in the background
  render();            // re-render with subject line and counts
})();
</script>
</body>
